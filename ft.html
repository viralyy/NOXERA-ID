<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bracket Vertikal</title>

<style>
body {
    background: #0d1117;
    color: #fff;
    font-family: sans-serif;
    padding: 20px;
}

/* CONTAINER */
.bracket {
    max-width: 400px;
    margin: auto;
}

/* ROUND */
.round {
    margin-bottom: 40px;
}

.title {
    text-align: center;
    margin-bottom: 15px;
    font-weight: bold;
}

/* MATCH */
.match {
    position: relative;
    margin-bottom: 20px;
    padding-left: 20px;
}

/* GARIS */
.match::before {
    content: "";
    position: absolute;
    left: 0;
    top: 10px;
    width: 2px;
    height: calc(100% - 20px);
    background: #555;
}

.match::after {
    content: "";
    position: absolute;
    left: 0;
    top: 50%;
    width: 15px;
    height: 2px;
    background: #555;
}

/* PLAYER (EDITABLE) */
.player {
    background: #161b22;
    border: 1px solid #30363d;
    padding: 8px;
    margin: 5px 0;
    border-radius: 6px;
    text-align: center;
    font-size: 14px;

    outline: none;
}

/* ANIMASI */
.player {
    opacity: 0;
    transform: translateY(10px);
    animation: fadeUp 0.4s ease forwards;
}

.player:nth-child(2) {
    animation-delay: 0.2s;
}

@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* JUARA */
.winner {
    text-align: center;
    font-size: 26px;
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="bracket">

    <!-- SEMI FINAL -->
    <div class="round">
        <div class="title">Semi Final</div>

        <div class="match">
            <div class="player" contenteditable="true">Klik isi nama</div>
            <div class="player" contenteditable="true">Klik isi nama</div>
        </div>

        <div class="match">
            <div class="player" contenteditable="true">Klik isi nama</div>
            <div class="player" contenteditable="true">Klik isi nama</div>
        </div>
    </div>

    <!-- FINAL -->
    <div class="round">
        <div class="title">Final</div>

        <div class="match">
            <div class="player" contenteditable="true">Pemenang 1</div>
            <div class="player" contenteditable="true">Pemenang 2</div>
        </div>
    </div>

    <!-- JUARA -->
    <div class="round">
        <div class="title">Juara</div>
        <div class="winner">🏆</div>
    </div>

</div>

</body>
</html>
