<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bracket Clean</title>

<style>
body {
    background: #0d1117;
    color: #fff;
    font-family: sans-serif;
    padding: 20px;
}

/* WRAPPER */
.bracket {
    max-width: 420px;
    margin: auto;
}

/* ROW */
.row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 15px 0;
}

/* PLAYER */
.player {
    background: #161b22;
    border: 1px solid #30363d;
    padding: 8px;
    border-radius: 6px;
    text-align: center;
    min-width: 100px;
    font-size: 14px;
    outline: none;
}

/* CENTER COLUMN */
.center {
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* LINE */
.line-h {
    height: 2px;
    background: #555;
    flex: 1;
}

.line-v {
    width: 2px;
    height: 40px;
    background: #555;
}

/* FINAL BOX */
.final {
    margin-top: 10px;
}

/* CHAMP */
.champ {
    margin-top: 20px;
    text-align: center;
    font-size: 24px;
}
</style>
</head>

<body>

<div class="bracket">

    <!-- TOP PLAYERS -->
    <div class="row">
        <div class="player" contenteditable>Name 1</div>
        <div class="player" contenteditable>Name 2</div>
    </div>

    <!-- CONNECT -->
    <div class="row">
        <div class="line-h"></div>
        <div class="center">
            <div class="line-v"></div>
        </div>
        <div class="line-h"></div>
    </div>

    <!-- SEMI WINNER -->
    <div class="row center">
        <div class="player" contenteditable>Pemenang 1</div>
    </div>

    <!-- BOTTOM PLAYERS -->
    <div class="row">
        <div class="player" contenteditable>Name 3</div>
        <div class="player" contenteditable>Name 4</div>
    </div>

    <!-- CONNECT -->
    <div class="row">
        <div class="line-h"></div>
        <div class="center">
            <div class="line-v"></div>
        </div>
        <div class="line-h"></div>
    </div>

    <!-- SEMI WINNER 2 -->
    <div class="row center">
        <div class="player" contenteditable>Pemenang 2</div>
    </div>

    <!-- FINAL CONNECT -->
    <div class="center">
        <div class="line-v" style="height:60px;"></div>
    </div>

    <!-- FINAL -->
    <div class="row center final">
        <div class="player" contenteditable>Final</div>
    </div>

    <!-- JUARA -->
    <div class="champ">🏆</div>

</div>

</body>
</html>
