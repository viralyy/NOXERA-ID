<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bracket Model Tengah</title>

<style>
body {
    background: #0d1117;
    color: white;
    font-family: sans-serif;
    display: flex;
    justify-content: center;
    padding: 20px;
}

/* WRAPPER */
.bracket {
    position: relative;
    width: 320px;
}

/* PLAYER BOX */
.player {
    background: #e6e6e6;
    color: #000;
    padding: 6px 10px;
    border-radius: 8px;
    text-align: center;
    font-size: 14px;
    position: absolute;
    min-width: 70px;
}

/* EDITABLE */
.player[contenteditable] {
    outline: none;
}

/* POSISI */
.p1 { top: 0; left: 0; }
.p2 { top: 0; right: 0; }
.p3 { top: 0; left: 160px; transform: translateX(-50%); }
.p4 { top: 0; right: 0; } /* nanti kita atur beda baris */

.p3 { top: 80px; left: 0; }
.p4 { top: 80px; right: 0; }

/* SEMI WINNER */
.w1 {
    top: 50px;
    left: 50%;
    transform: translateX(-50%);
}

.w2 {
    top: 130px;
    left: 50%;
    transform: translateX(-50%);
}

/* FINAL */
.final {
    top: 210px;
    left: 50%;
    transform: translateX(-50%);
}

/* JUARA */
.champ {
    top: 300px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 20px;
}

/* GARIS */
.line {
    position: absolute;
    background: #00ff99;
}

/* SEMI LINES */
.l1 { top: 20px; left: 60px; width: 60px; height: 2px; }
.l2 { top: 20px; right: 60px; width: 60px; height: 2px; }

.l3 { top: 100px; left: 60px; width: 60px; height: 2px; }
.l4 { top: 100px; right: 60px; width: 60px; height: 2px; }

/* VERTICAL KE TENGAH */
.v1 {
    top: 20px;
    left: 120px;
    width: 2px;
    height: 80px;
}

.v2 {
    top: 20px;
    right: 120px;
    width: 2px;
    height: 80px;
}

/* FINAL LINE */
.middle {
    top: 170px;
    left: 50%;
    width: 120px;
    height: 2px;
    transform: translateX(-50%);
}

/* DOWN TO CHAMP */
.down {
    top: 170px;
    left: 50%;
    width: 2px;
    height: 120px;
    transform: translateX(-50%);
}
</style>
</head>

<body>

<div class="bracket">

    <!-- PLAYER -->
    <div class="player p1" contenteditable>Name 1</div>
    <div class="player p2" contenteditable>Name 2</div>

    <div class="player p3" contenteditable>Name 3</div>
    <div class="player p4" contenteditable>Name 4</div>

    <!-- SEMI WIN -->
    <div class="player w1" contenteditable>Win 1</div>
    <div class="player w2" contenteditable>Win 2</div>

    <!-- FINAL -->
    <div class="player final" contenteditable>Final</div>

    <!-- CHAMP -->
    <div class="player champ">🏆</div>

    <!-- GARIS -->
    <div class="line l1"></div>
    <div class="line l2"></div>
    <div class="line l3"></div>
    <div class="line l4"></div>

    <div class="line v1"></div>
    <div class="line v2"></div>

    <div class="line middle"></div>
    <div class="line down"></div>

</div>

</body>
</html>
