<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOXERA ID</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@2/dist/email.min.js"></script>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0d0d0d;
    color: #fff;
}

.container {
    max-width: 480px;
    margin: auto;
    padding: 16px;
}

/* LOGO */
.logo {
    text-align: center;
    margin-top: 20px;
}

.logo img {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    border: 2px solid #ff3c3c;
}

/* TITLE */
h1 {
    text-align: center;
    margin: 10px 0;
    color: #ff3c3c;
}

.desc {
    text-align: center;
    font-size: 14px;
    color: #aaa;
    margin-bottom: 20px;
}

/* CARD */
.card {
    background: #161616;
    padding: 16px;
    border-radius: 12px;
    margin-bottom: 15px;
}

/* SYARAT */
.syarat {
    margin-top: 10px;
    padding-left: 18px;
    line-height: 1.6;
}

.syarat li {
    margin-bottom: 6px;
    color: #ddd;
}

/* FORM FIX */
form {
    margin-top: 10px;
}

input, select {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    background: #222;
    color: white;
    display: block;
}

/* BUTTON */
button {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    border: none;
    border-radius: 10px;
    background: #ff3c3c;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

/* SUCCESS */
.success {
    display: none;
    margin-top: 10px;
    padding: 10px;
    background: #1c3c1c;
    border-radius: 8px;
    text-align: center;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
<img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj0BrEuL2LM71P1Ezl6HY-Eg7rp1IZe_I73-pVFRfzL741Dg9QZ5bjA1cPhACXqTBn_AAKfnQCRf0c5RJ-ShEVWqW_q9ap4boUmecUaqi3bVI40C8Bfn_v-VGzsGIaWlaWCq_5Hy3w_8KF-IiiZsa5Gc-QWx5-bDynfJCmszBdLhNJpu7-2ZKsBqGP7SLPt/s4096/129409.jpg">
</div>

<h1>NOXERA ID</h1>
<p class="desc">Guild santai tapi tetep serius. Mabar bareng, no drama.</p>

<div class="card">
<b>Syarat Join:</b>

<ul class="syarat">
<li>good attitude</li>
<li>no kutu loncat</li>
<li>on guild war</li>
<li>aktif minimal sehari sekali</li>
<li>level di atas 50</li>
<li>rank ngga di tentukaan</li>
</ul>
</div>

<div class="card">
<b>Form Pendaftaran</b>

<form id="form">

<input type="text" id="nickname" placeholder="Nickname FF" required>
<input type="text" id="idff" placeholder="ID Free Fire" required>
<input type="number" id="umur" placeholder="Umur" required>
<input type="text" id="wa" placeholder="Nomor WhatsApp" required>

<select id="rank">
<option>Bronze</option>
<option>Silver</option>
<option>Gold</option>
<option>Platinum</option>
<option>Diamond</option>
<option>Heroic</option>
</select>

<select id="role">
<option>Rusher</option>
<option>Support</option>
<option>Sniper</option>
<option>All Role</option>
</select>

<select id="jam">
<option>Pagi</option>
<option>Siang</option>
<option>Malam</option>
<option>Bebas</option>
</select>

<select id="komitmen">
<option>Casual</option>
<option>Push Rank</option>
<option>Serius</option>
</select>

<button type="submit">REQ JOIN SEKARANG</button>

<div class="success" id="successMsg">
Data berhasil dikirim!
</div>

</form>
</div>

</div>

<script>
(function(){
emailjs.init("VkzB5UmXE_ES93XZQ");
})();

document.getElementById("form").addEventListener("submit", function(e){
e.preventDefault();

emailjs.send("service_sjpebfw","template_0n1b1jd",{
nickname: nickname.value,
idff: idff.value,
umur: umur.value,
wa: wa.value,
rank: rank.value,
role: role.value,
jam: jam.value,
komitmen: komitmen.value,
date: new Date().toLocaleString()
})
.then(function(){
successMsg.style.display = "block";
form.reset();
}, function(error){
alert("Gagal kirim!");
console.log(error);
});
});
</script>

</body>
</html>
