<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Member NOXERA ID</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@2/dist/email.min.js"></script>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(180deg, #0f0f0f, #000);
    color: white;
}

/* CONTAINER */
.container {
    max-width: 520px;
    margin: auto;
    padding: 20px;
}

/* LOGO */
.logo {
    display: flex;
    justify-content: center;
    margin-top: 20px;
}

.logo img {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    border: 3px solid #ff3c3c;
    box-shadow: 0 0 20px rgba(255,60,60,0.5);
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { box-shadow: 0 0 10px rgba(255,60,60,0.4); }
    to { box-shadow: 0 0 25px rgba(255,60,60,0.9); }
}

/* TITLE */
h1 {
    text-align: center;
    margin: 10px 0 5px;
    color: #ff3c3c;
}

.subtitle {
    text-align: center;
    color: #aaa;
    font-size: 14px;
    margin-bottom: 20px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(10px);
    padding: 16px;
    border-radius: 14px;
    margin-bottom: 15px;
    border: 1px solid rgba(255,255,255,0.05);
    animation: fadeUp 0.6s ease;
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* FORM */
input, select {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    background: #1c1c1c;
    color: white;
}

input:focus, select:focus {
    outline: 1px solid #ff3c3c;
}

/* BUTTON */
button {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(45deg, #ff3c3c, #ff0000);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.03);
}

/* SUCCESS */
.success {
    display: none;
    margin-top: 10px;
    padding: 10px;
    border-radius: 8px;
    background: #133013;
    text-align: center;
}

/* FOOTER */
.footer {
    text-align: center;
    color: #666;
    font-size: 12px;
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">

<!-- LOGO -->
<div class="logo">
<img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj0BrEuL2LM71P1Ezl6HY-Eg7rp1IZe_I73-pVFRfzL741Dg9QZ5bjA1cPhACXqTBn_AAKfnQCRf0c5RJ-ShEVWqW_q9ap4boUmecUaqi3bVI40C8Bfn_v-VGzsGIaWlaWCq_5Hy3w_8KF-IiiZsa5Gc-QWx5-bDynfJCmszBdLhNJpu7-2ZKsBqGP7SLPt/s4096/129409.jpg">
</div>

<h1>NOXERA ID</h1>
<p class="subtitle">Guild santai tapi tetep niat. Mabar, push rank, no drama.</p>

<!-- INFO -->
<div class="card">
<p>
Cari temen mabar yang aktif? disini tempatnya.  
Gak harus pro, yang penting niat & gak toxic
</p>
</div>

<!-- SYARAT -->
<div class="card">
<b>Syarat Join:</b><br><br>
- Aktif main<br>
- No toxic<br>
- Jangan kutu loncat<br>
- Bisa diajak mabar
</div>

<!-- FORM -->
<div class="card">
<b>Form Pendaftaran</b>

<form id="form">

<input type="text" id="nickname" placeholder="Nickname FF" required>
<input type="text" id="idff" placeholder="ID Free Fire" required>
<input type="number" id="umur" placeholder="Umur" required>
<input type="text" id="wa" placeholder="Nomor WhatsApp" required>

<select id="rank">
<option>Bronze</option>
<option>Silver</option>
<option>Gold</option>
<option>Platinum</option>
<option>Diamond</option>
<option>Heroic</option>
</select>

<select id="role">
<option>Rusher</option>
<option>Support</option>
<option>Sniper</option>

</select>

<select id="jam">
<option>Pagi</option>
<option>Siang</option>
<option>Malam</option>

</select>

<select id="komitmen">
<option>Casual</option>
<option>Push Rank</option>
<option>Serius / Squad Tetap</option>
</select>

<button type="submit">DAFTAR SEKARANG</button>

<div class="success" id="successMsg">
✅ Data berhasil dikirim!
</div>

</form>
</div>

<div class="footer">
© NOXERA ID
</div>

</div>

<script>
(function(){
    emailjs.init("VkzB5UmXE_ES93XZQ");
})();

const form = document.getElementById("form");

form.addEventListener("submit", function(e){
    e.preventDefault();

    emailjs.send("service_sjpebfw","template_0n1b1jd",{
        nickname: document.getElementById("nickname").value,
        idff: document.getElementById("idff").value,
        umur: document.getElementById("umur").value,
        wa: document.getElementById("wa").value,
        rank: document.getElementById("rank").value,
        role: document.getElementById("role").value,
        jam: document.getElementById("jam").value,
        komitmen: document.getElementById("komitmen").value,
        date: new Date().toLocaleString()
    })
    .then(function(){
        document.getElementById("successMsg").style.display = "block";
        form.reset();
    }, function(error){
        alert("Gagal kirim!");
        console.log(error);
    });
});
</script>

</body>
</html>
